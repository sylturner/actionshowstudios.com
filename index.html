<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Action Show Studios</title>
    <link rel="stylesheet" href="./assets/css/crt.css">

    <script type="module">
      import { Application } from "./assets/js/stimulus.js";
      import MenuController from "./assets/js/controllers/menu_controller.js";
      import VideoListingController from "./assets/js/controllers/video_listing_controller.js";
      import ScreenController from "./assets/js/controllers/screen_controller.js";

      const application = Application.start();
      application.register("menu", MenuController);
      application.register("video_listing", VideoListingController);
      application.register("screen", ScreenController);
    </script>
  </head>
  <body>
    <div id="tv" class="scanlines">
      <div class="screen" data-controller="screen">
        <div id="player">
          <iframe
            id="videos"
            src="https://player.vimeo.com/video/751390334?background=1&autoplay=1&muted=1&loop=1"
            frameborder="0"
            allow="autoplay; fullscreen"></iframe>
        </div>
        <div class="overlay">
          <div class="channel" data-screen-target="channel">
            <span>ASSSS+</span>
          </div>

          <div class="menu" data-controller="menu" data-menu-target="menu">
            <header>
              Action Show Studios
            </header>
            <ul>
              <li><a href="#" title="" tabindex="0">Features</a></li>
              <li><a href="#" title="" tabindex="0">Shorts</a></li>
              <li><a href="#" title="" tabindex="0">Commercial</a></li>
              <li><a href="#" title="" tabindex="0">Music Videos</a></li>
              <li><a href="https://www.sharegrid.com/p/sean_bokelmann" title="Equipment Rentals" target="_blank" tabindex="0">Equipment Rentals</a></li>
              <li><a href="#" title="" tabindex="0">About</a></li>
              <li><a href="#" title="" tabindex="0">Contact</a></li>
            </ul>
            <div class="footer">
              <div class="social-icons">
                <a href="https://instagram.com/actionshowstudios/" title="Instagram" target="_blank"><img src="assets/images/icons/instagram.png" alt="Instagram"></a>
                <a href="https://youtube.com/actionshowstudios/" title="YouTube" target="_blank"><img src="assets/images/icons/youtube.png" alt="YouTube"></a>
                <a href="https://facebook.com/ActionShowStudios/" title="Facebook" target="_blank"><img src="assets/images/icons/facebook.png" alt="Facebook"></a>
                <a href="https://kick.com/actionshowstudios" title="Kick" target="_blank"><img src="assets/images/icons/kick.png" alt="Kick"></a>
                <a href="https://www.tiktok.com/@actionshowstudios" title="TikTok" target="_blank"><img src="assets/images/icons/tiktok.png" alt="TikTok"></a>
                <a href="https://vimeo.com/user87424039" title="Vimeo" target="_blank"><img src="assets/images/icons/vimeo.png" alt="Vimeo"></a>
                <a href="https://maps.app.goo.gl/np6PYfVwxFEoZDJH9" title="Location" target="_blank"><img src="assets/images/icons/map.png" alt="Location: 1526 DeKalb Ave NE, Atlanta, GA 30307"></a>
                <a href="tel:4048551606" title="Call Us" target="_blank"><img src="assets/images/icons/tel.png" alt="Call us: 404-855-1606"></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
